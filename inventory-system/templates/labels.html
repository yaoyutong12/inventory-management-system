{% extends "base.html" %}
{% block title %}ラベル印刷 - 托盘杂货进销存{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h4><i class="bi bi-upc-scan me-2"></i>ラベル印刷</h4>
    <div>
        <button class="btn btn-outline-primary" id="selectAllBtn" onclick="selectAll()"><i class="bi bi-check-all"></i> 全選択</button>
        <div class="btn-group">
            <button class="btn btn-primary" onclick="printSelected('normal')"><i class="bi bi-printer"></i> 普通打印 (A4)</button>
            <button class="btn btn-success" onclick="printSelected('thermal')"><i class="bi bi-receipt"></i> 热敏打印 (48mm)</button>
        </div>
    </div>
</div>

<div class="alert alert-info small mb-3">
    <i class="bi bi-info-circle"></i> 
    <strong>📱 印臣B21等热敏打印机：</strong>选择商品 → 点击「热敏打印」→ 在打印对话框中选择纸张尺寸为 48mm x 35mm。也可以点击「预览」→ 右键保存二维码图片 → 手机打开印臣APP打印。
</div>

<div class="row g-3 mb-3">
    <div class="col-md-4">
        <input class="form-control" id="labelSearch" placeholder="商品名・コード検索..." oninput="filterLabels()">
    </div>
    <div class="col-md-4">
        <select class="form-select" id="labelCatFilter" onchange="filterLabels()">
            <option value="">全カテゴリ</option>
        </select>
    </div>
        <div class="col-md-4">
            <select class="form-select" onchange="filterLabels()">
                <option value="all" selected>全商品（默认显示全部）</option>
                <option value="in_stock">在庫ありのみ</option>
                <option value="unlabeled">ラベル未発行</option>
            </select>
        </div>
</div>

<div class="card">
    <div class="card-body">
        <div class="table-responsive">
            <table class="table table-hover" id="labelTable">
                <thead>
                    <tr>
                        <th style="width:40px"><input type="checkbox" id="selectAllCB" onchange="toggleAll(this)"></th>
                        <th>内部コード</th><th>商品名</th><th>販売価格</th><th>状態</th><th>プレビュー</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
        <div class="mt-3 text-center" id="labelPagination"></div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
// API helper
const API = {
    async get(url) {
        const resp = await fetch(url);
        if (!resp.ok) throw new Error('HTTP ' + resp.status);
        return resp.json();
    },
    async post(url, data) {
        const resp = await fetch(url, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(data)
        });
        if (!resp.ok) throw new Error('HTTP ' + resp.status);
        return resp.json();
    }
};

function formatJPY(n) { return '¥' + Number(n).toLocaleString('ja-JP'); }

let allLabels = [];
let selectedIds = new Set();

async function loadLabels() {
    try {
        // 显示加载状态
        const tbody = document.querySelector('#labelTable tbody');
        if (tbody) {
            tbody.innerHTML = '<tr><td colspan="6" class="text-center py-4"><div class="spinner-border text-primary"></div><p class="mt-2 text-muted">読み込み中...</p></td></tr>';
        }

        const resp = await fetch('/api/inventory/list?_t=' + Date.now()); // 破坏缓存
        if (!resp.ok) {
            throw new Error(`HTTP ${resp.status}: ${resp.statusText}`);
        }
        const allProducts = await resp.json();
        
        // 调试：在页面上显示调试信息
        console.log('=== ラベルデータデバッグ ===');
        console.log('全商品数:', allProducts.length);
        
        // 在页面顶部显示数据状态（临时，方便排查）
        let debugDiv = document.getElementById('labelsDebugInfo');
        if (!debugDiv) {
            debugDiv = document.createElement('div');
            debugDiv.id = 'labelsDebugInfo';
            debugDiv.className = 'alert alert-secondary small';
            debugDiv.style.fontSize = '11px';
            const cardBody = document.querySelector('.card-body');
            if (cardBody) cardBody.insertBefore(debugDiv, cardBody.firstChild);
        }
        
        debugDiv.innerHTML = `<strong>デバッグ:</strong> APIから ${allProducts.length}件の商品を取得しました。` +
            (allProducts.length > 0 ? ` 先頭: ${allProducts[0].internal_code} - ${(allProducts[0].product_name||'')[:30]}` : '');
        
        // 默认加载全部商品（不过滤），由下拉框控制是否过滤
        allLabels = allProducts;
        
        if (allLabels.length === 0) {
            let msg = '<tr><td colspan="6" class="text-center py-5 text-muted">';
            msg += '商品がありません。<br><a href="/import" class="btn btn-sm btn-primary mt-2">仕入リストをアップロード</a>';
            msg += '</td></tr>';
            document.querySelector('#labelTable tbody').innerHTML = msg;
            return;
        }
        
        const categories = [...new Set(allLabels.map(p => p.category).filter(Boolean))];
        const catSelect = document.getElementById('labelCatFilter');
        catSelect.innerHTML = '<option value="">全カテゴリ</option>';
        categories.forEach(c => {
            const opt = document.createElement('option');
            opt.value = c; opt.textContent = c;
            catSelect.appendChild(opt);
        });
        
        renderLabelTable(allLabels);
    } catch(e) {
        console.error('Failed to load labels:', e);
        const tbody = document.querySelector('#labelTable tbody');
        if (tbody) {
            tbody.innerHTML = '<tr><td colspan="6" class="text-center py-5 text-danger">データの読み込みに失敗しました: ' + e.message + '</td></tr>';
        }
    }
}

function renderLabelTable(products) {
    const tbody = document.querySelector('#labelTable tbody');
    tbody.innerHTML = products.map(p => `
        <tr>
            <td><input type="checkbox" class="label-cb" value="${p.id}" ${selectedIds.has(p.id)?'checked':''} onchange="toggleLabel(${p.id},this)"></td>
            <td><code>${p.internal_code}</code></td>
            <td>${(p.product_name||'')[:50]}</td>
            <td class="fw-bold">${formatJPY(p.selling_price||0)}</td>
            <td><span class="badge bg-${p.current_stock>3?'success':'warning'}">${p.current_stock}個</span></td>
            <td><button class="btn btn-sm btn-outline-secondary" onclick="previewLabel(${p.id})"><i class="bi bi-eye"></i></button></td>
        </tr>`).join('');
}

function toggleAll(cb) {
    document.querySelectorAll('.label-cb').forEach(c => {
        c.checked = cb.checked;
        toggleLabel(parseInt(c.value), c);
    });
}

function toggleLabel(id, cb) {
    if (cb.checked) selectedIds.add(id);
    else selectedIds.delete(id);
}

function selectAll() {
    document.getElementById('selectAllCB').checked = true;
    document.querySelectorAll('.label-cb').forEach(c => {
        c.checked = true;
        selectedIds.add(parseInt(c.value));
    });
}

function showAllProducts() {
    // 重新加载并显示所有商品（包括库存为0的）
    API.get('/api/inventory/list').then(allProducts => {
        allLabels = allProducts; // 不过滤，显示所有
        renderLabelTable(allLabels);
        showToast(`全${allProducts.length}件の商品を表示しました`, 'info');
    });
}

function filterLabels() {
    const search = document.getElementById('labelSearch').value.toLowerCase();
    const cat = document.getElementById('labelCatFilter').value;
    // 获取筛选模式下拉框（第三个select）
    const modeSelect = document.querySelector('select[onchange="filterLabels()"]:last-of-type');
    const mode = modeSelect ? modeSelect.value : 'all';
    
    let filtered = allLabels;
    
    // 按模式过滤
    if (mode === 'in_stock') {
        filtered = filtered.filter(p => (p.current_stock || 0) > 0);
    }
    
    if (cat) filtered = filtered.filter(p => p.category === cat);
    if (search) filtered = filtered.filter(p => 
        (p.product_name||'').toLowerCase().includes(search) || 
        (p.internal_code||'').toLowerCase().includes(search)
    );
    renderLabelTable(filtered);
}

async function previewLabel(id) {
    const result = await API.post('/api/labels/generate', {product_ids: [id]});
    if (result.labels.length > 0) {
        const l = result.labels[0];
        const win = window.open('', '_blank', 'width=400,height=450');
        win.document.write(`
            <html><head><title>ラベルプレビュー</title>
            <style>
                @page { size: 62mm 40mm; margin: 3mm; }
                body { font-family: 'MS Gothic', sans-serif; margin: 20px; display:flex; justify-content:center; }
                .label { text-align: center; border: 2px dashed #ccc; padding: 20px; border-radius: 12px; width: 250px; }
                .label img { width: 150px; height: 150px; }
                .label .code { font-size: 16px; font-weight: bold; margin: 8px 0; }
                .label .name { font-size: 9px; margin: 4px 0; word-break: break-all; }
                .label .price { font-size: 24px; font-weight: bold; color: #c00; }
            </style></head><body>
            <div class="label">
                <img src="data:image/png;base64,${l.qr_code}">
                <div class="code">${l.internal_code}</div>
                <div class="name">${l.product_name}</div>
                <div class="price">¥${Number(l.selling_price||0).toLocaleString()}</div>
            </div>
        `);
    }
}

async function printSelected(mode = 'normal') {
    if (selectedIds.size === 0) {
        showToast('印刷するラベルを選択してください', 'warning');
        return;
    }
    
    const result = await API.post('/api/labels/generate', {product_ids: [...selectedIds]});
    if (result.labels.length === 0) return;
    
    const isThermal = mode === 'thermal';
    const win = window.open('', '_blank', `width=${isThermal ? 400 : 800},height=600`);
    
    if (isThermal) {
        // Thermal print - one label per page, 48mm width
        win.document.write(`
            <html><head><title>热敏标签印刷 (${result.labels.length}枚)</title>
            <style>
                @page { size: 48mm 35mm; margin: 1mm; }
                body { 
                    font-family: 'MS Gothic', 'Microsoft YaHei', sans-serif; 
                    margin: 0; padding: 0;
                }
                .thermal-label { 
                    text-align: center; 
                    padding: 1mm; 
                    page-break-after: always;
                    width: 46mm;
                }
                .thermal-label img { 
                    width: 28mm; height: 28mm; 
                    display: block; margin: 0 auto;
                }
                .thermal-label .code { 
                    font-size: 9px; font-weight: bold; 
                    margin: 1mm 0; letter-spacing: 0.5px;
                }
                .thermal-label .name { 
                    font-size: 6px; margin: 0.5mm 0; 
                    word-break: break-all; line-height: 1.2;
                    max-height: 9mm; overflow: hidden;
                }
                .thermal-label .price { 
                    font-size: 12px; font-weight: bold; 
                    color: #000; margin: 0.5mm 0;
                }
                @media print { 
                    body { -webkit-print-color-adjust: exact; }
                }
            </style></head><body>
            ${result.labels.map(l => `
                <div class="thermal-label">
                    <img src="data:image/png;base64,${l.qr_code}">
                    <div class="code">${l.internal_code}</div>
                    <div class="name">${l.product_name}</div>
                    <div class="price">¥${Number(l.selling_price||0).toLocaleString()}</div>
                </div>
            `).join('')}
            <script>window.onload=function(){window.print();}<\/script>
        `);
    } else {
        // Normal A4 print
        win.document.write(`
            <html><head><title>ラベル印刷 (${result.labels.length}枚)</title>
            <style>
                @page { size: A4; margin: 10mm; }
                body { font-family: 'MS Gothic', sans-serif; margin: 0; padding: 0; }
                .labels { display: flex; flex-wrap: wrap; gap: 5px; justify-content: flex-start; padding: 10px; }
                .label { width: 170px; height: 110px; border: 1px solid #ccc; padding: 5px; text-align: center; 
                         page-break-inside: avoid; border-radius: 6px; display: flex; flex-direction: column; align-items: center; }
                .label img { width: 60px; height: 60px; }
                .label .code { font-size: 11px; font-weight: bold; margin: 2px 0; }
                .label .name { font-size: 7px; margin: 1px 0; overflow: hidden; max-height: 2em; }
                .label .price { font-size: 13px; font-weight: bold; color: #c00; }
                @media print { .label { border-color: #ddd; } }
            </style></head><body>
            <div class="labels">
                ${result.labels.map(l => `
                    <div class="label">
                        <img src="data:image/png;base64,${l.qr_code}">
                        <div class="code">${l.internal_code}</div>
                        <div class="name">${l.product_name}</div>
                        <div class="price">¥${Number(l.selling_price||0).toLocaleString()}</div>
                    </div>
                `).join('')}
            </div>
            <script>window.onload=function(){window.print();}<\/script>
        `);
    }
    
    const modeLabel = isThermal ? '热敏 (48mm)' : 'A4';
    showToast(`${result.labels.length}枚のラベルを${modeLabel}で印刷します`, 'info');
}

loadLabels();
</script>
{% endblock %}
