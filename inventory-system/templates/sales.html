{% extends "base.html" %}
{% block title %}销售 - 托盘杂货进销存{% endblock %}

{% block content %}
<div class="row g-3">
    <!-- Sales POS -->
    <div class="col-lg-6">
        <div class="card">
            <div class="card-body">
                <h5 class="card-title"><i class="bi bi-cart-check me-2"></i>销售收银</h5>
                
                <!-- Scanner -->
                <div class="mb-3">
                    <div class="input-group input-group-lg">
                        <span class="input-group-text"><i class="bi bi-upc-scan"></i></span>
                        <input class="form-control" id="salesBarcode" placeholder="扫描或输入内部二维码..." 
                               onkeydown="if(event.key==='Enter')scanProduct()" autofocus>
                        <button class="btn btn-primary" onclick="scanProduct()">
                            <i class="bi bi-search"></i>
                        </button>
                    </div>
                    <div class="mt-2 d-flex gap-2 align-items-center flex-wrap">
                        <button class="btn btn-sm btn-outline-secondary" id="salesScanBtn" onclick="startSalesScanner()">
                            <i class="bi bi-camera-video"></i> 连续扫码
                        </button>
                        <input type="file" id="salesPhotoInput" accept="image/*" capture="environment"
                               style="display:none" onchange="photoScanBarcode(this)">
                        <button class="btn btn-sm btn-outline-success" onclick="document.getElementById('salesPhotoInput').click()">
                            <i class="bi bi-camera"></i> 拍照扫码
                        </button>
                        <button class="btn btn-sm btn-outline-danger d-none" id="salesStopBtn" onclick="stopSalesScanner()">
                            <i class="bi bi-stop-circle"></i> 停止
                        </button>
                        <button class="btn btn-sm btn-warning ms-auto" onclick="openExternalSaleModal()">
                            <i class="bi bi-box-arrow-up-right"></i> 外部销售登记
                        </button>
                    </div>
                    <div id="salesScannerView" class="mt-2" style="width:100%;max-width:300px"></div>
                </div>
                
                <!-- Product Info -->
                <div id="productInfo" class="d-none">
                    <div class="card bg-light">
                        <div class="card-body">
                            <div class="row">
                                <div class="col-8">
                                    <h6 id="prodName" class="mb-1"></h6>
                                    <small class="text-muted"><code id="prodCode"></code> | 库存: <strong id="prodStock"></strong>个</small>
                                </div>
                                <div class="col-4 text-end">
                                    <h4 class="text-primary mb-0" id="prodPrice"></h4>
                                </div>
                            </div>
                            <div class="row mt-2 align-items-end">
                                <div class="col-3">
                                    <label class="form-label small">数量</label>
                                    <input type="number" class="form-control" id="saleQty" value="1" min="1">
                                </div>
                                <div class="col-3">
                                    <label class="form-label small">支付方式</label>
                                    <select class="form-select" id="paymentMethod">
                                        <option value="cash">现金</option>
                                        <option value="paypay">PayPay</option>
                                        <option value="card">银行卡</option>
                                        <option value="mercari">煤炉</option>
                                        <option value="other">其他</option>
                                    </select>
                                </div>
                                <div class="col-3">
                                    <label class="form-label small">销售平台 <span class="text-danger">*</span></label>
                                    <select class="form-select" id="salesPlatform">
                                        <option value="physical">🏪 实体店</option>
                                        <option value="mercari">🛒 煤炉</option>
                                        <option value="yahoo">🟨 雅虎拍卖</option>
                                        <option value="rakuten">🛍️ 乐天</option>
                                        <option value="other">📦 其他</option>
                                    </select>
                                </div>
                                <div class="col-3">
                                    <label class="form-label small">小票</label>
                                    <div class="form-check form-switch mt-1">
                                        <input class="form-check-input" type="checkbox" id="printReceipt" checked>
                                        <label class="form-check-label small" for="printReceipt">打印</label>
                                    </div>
                                </div>
                                <div class="col-3">
                                    <button class="btn btn-success w-100" onclick="doSale()">
                                        <i class="bi bi-check-lg"></i> 确认销售
                                    </button>
                                </div>
                            </div>
                            <div class="mt-2 text-end">
                                <span class="text-muted small">合计: </span>
                                <strong class="fs-5 text-success" id="saleTotal">¥0</strong>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Today Summary -->
        <div class="card mt-3">
            <div class="card-body">
                <h6 class="card-title"><i class="bi bi-receipt me-2"></i>今日销售汇总</h6>
                <div class="row text-center">
                    <div class="col-4">
                        <div class="fs-4 fw-bold text-primary" id="todayCount">0</div>
                        <small class="text-muted">销售件数</small>
                    </div>
                    <div class="col-4">
                        <div class="fs-4 fw-bold text-success" id="todayRevenue">¥0</div>
                        <small class="text-muted">销售额</small>
                    </div>
                    <div class="col-4">
                        <div class="fs-4 fw-bold text-info" id="todayProfit">¥0</div>
                        <small class="text-muted">利润</small>
                    </div>
                </div>
                <!-- Platform breakdown -->
                <div class="mt-3" id="platformBreakdown">
                    <small class="text-muted">平台明细：</small>
                    <div id="platformStats" class="d-flex gap-2 flex-wrap mt-1"></div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Sales History with Platform Filter -->
    <div class="col-lg-6">
        <div class="card">
            <div class="card-body">
                <h5 class="card-title">
                    <i class="bi bi-clock-history me-2"></i>销售记录
                    <small class="text-muted ms-2">（可补打小票）</small>
                </h5>
                <!-- Platform Filter -->
                <div class="mb-3 d-flex gap-2 align-items-center">
                    <label class="form-label small mb-0">筛选平台:</label>
                    <select class="form-select form-select-sm" id="platformFilter" onchange="loadSalesHistory()" style="width:auto;">
                        <option value="">全部</option>
                        <option value="physical">🏪 实体店</option>
                        <option value="mercari">🛒 煤炉</option>
                        <option value="yahoo">🟨 雅虎</option>
                        <option value="rakuten">🛍️ 乐天</option>
                        <option value="other">📦 其他</option>
                    </select>
                    <label class="form-label small mb-0 ms-2">日期:</label>
                    <input type="date" class="form-control form-control-sm" id="salesDateFilter" onchange="loadSalesHistory()" style="width:auto;">
                </div>
                <div style="max-height:550px;overflow-y:auto" id="salesHistory">
                    <p class="text-muted text-center py-4">加载中...</p>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- External Sale Modal -->
<div class="modal fade" id="externalSaleModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">外部销售登记</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <p class="text-muted small">用于登记已在煤炉/雅虎等平台售出的商品</p>
                <div class="mb-3">
                    <label class="form-label small">商品条码 *</label>
                    <div class="input-group">
                        <input class="form-control" id="externalBarcode" placeholder="扫描或输入内部码">
                        <button class="btn btn-outline-primary" onclick="lookupExternalProduct()">
                            <i class="bi bi-search"></i>
                        </button>
                    </div>
                </div>
                <div id="externalProductInfo" class="d-none">
                    <div class="alert alert-info">
                        <strong id="extProdName"></strong><br>
                        <small>库存: <span id="extProdStock"></span> | 价格: <span id="extProdPrice"></span></small>
                    </div>
                </div>
                <div class="row g-2 mb-3">
                    <div class="col-6">
                        <label class="form-label small">销售平台 *</label>
                        <select class="form-select" id="externalPlatform">
                            <option value="mercari">🛒 煤炉</option>
                            <option value="yahoo">🟨 雅虎拍卖</option>
                            <option value="rakuten">🛍️ 乐天</option>
                            <option value="other">📦 其他</option>
                        </select>
                    </div>
                    <div class="col-6">
                        <label class="form-label small">实际售价 (¥) *</label>
                        <input type="number" class="form-control" id="externalPrice" placeholder="0">
                    </div>
                </div>
                <div class="row g-2 mb-3">
                    <div class="col-6">
                        <label class="form-label small">数量</label>
                        <input type="number" class="form-control" id="externalQty" value="1" min="1">
                    </div>
                    <div class="col-6">
                        <label class="form-label small">平台订单号</label>
                        <input type="text" class="form-control" id="externalOrderNo" placeholder="选填">
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                <button class="btn btn-primary" onclick="registerExternalSale()">
                    <i class="bi bi-check-lg"></i> 登记销售
                </button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
let currentProduct = null;
let externalProduct = null;

// ─── Continuous Scanner (getUserMedia + pyzbar后端) ──
let _scanStream = null;
let _scanTimer = null;
let _scanRunning = false;

async function startSalesScanner() {
    if (_scanRunning) return;
    _scanRunning = true;
    
    document.getElementById('salesScanBtn').classList.add('d-none');
    document.getElementById('salesStopBtn').classList.remove('d-none');
    
    const view = document.getElementById('salesScannerView');
    view.innerHTML = '<video id="scanVideo" autoplay playsinline style="width:100%;max-width:360px;border-radius:8px;background:#000"></video>'
                   + '<div id="scanStatus" class="text-center small mt-1 text-muted">对准条码...</div>';
    
    try {
        _scanStream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } },
            audio: false
        });
        
        const video = document.getElementById('scanVideo');
        video.srcObject = _scanStream;
        await video.play();
        
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        
        // Main scan loop: run every 350ms
        _scanTimer = setInterval(async () => {
            if (!_scanRunning || !_scanStream) return;
            
            try {
                // Grab frame
                canvas.width = video.videoWidth || 640;
                canvas.height = video.videoHeight || 480;
                ctx.drawImage(video, 0, 0);
                
                // Strategy 1: Try BarcodeDetector (fast, no network)
                if (window.BarcodeDetector) {
                    try {
                        const bd = new BarcodeDetector({ formats: ['code_128', 'code_39', 'code_93', 'ean_13', 'ean_8', 'upc_a', 'upc_e', 'itf', 'codabar'] });
                        const barcodes = await bd.detect(canvas);
                        if (barcodes.length > 0) {
                            onBarcodeFound(barcodes[0].rawValue, 'BarcodeDetector');
                            return;
                        }
                        // Also try grayscale version
                        const grayCanvas = document.createElement('canvas');
                        grayCanvas.width = canvas.width;
                        grayCanvas.height = canvas.height;
                        const gctx = grayCanvas.getContext('2d');
                        gctx.filter = 'grayscale(1) contrast(1.2)';
                        gctx.drawImage(canvas, 0, 0);
                        const barcodes2 = await bd.detect(grayCanvas);
                        if (barcodes2.length > 0) {
                            onBarcodeFound(barcodes2[0].rawValue, 'BarcodeDetector(gray)');
                            return;
                        }
                    } catch(e) { /* BarcodeDetector may not support all formats */ }
                }
                
                // Strategy 2: Send frame to server pyzbar (reliable but needs network)
                canvas.toBlob(async (blob) => {
                    if (!_scanRunning || !blob) return;
                    try {
                        const fd = new FormData();
                        fd.append('frame', blob, 'frame.jpg');
                        const res = await fetch('/api/barcode/scan-frame', { method: 'POST', body: fd });
                        const data = await res.json();
                        if (data.found && data.barcode) {
                            onBarcodeFound(data.barcode, 'pyzbar');
                        }
                    } catch(e) { /* network error, will retry next frame */ }
                }, 'image/jpeg', 0.6);
                
            } catch(e) { /* frame grab fails sometimes, skip */ }
            
        }, 350);
        
        document.getElementById('scanStatus').textContent = '对准条码...';
        
    } catch (err) {
        stopSalesScanner();
        showToast('摄像头不可用: ' + err.message, 'danger');
    }
}

function onBarcodeFound(barcode, method) {
    console.log('[SalesScan] ' + method + ' 识别: ' + barcode);
    document.getElementById('salesBarcode').value = barcode;
    stopSalesScanner();
    scanProduct();
}

async function stopSalesScanner() {
    _scanRunning = false;
    
    if (_scanTimer) {
        clearInterval(_scanTimer);
        _scanTimer = null;
    }
    if (_scanStream) {
        _scanStream.getTracks().forEach(t => t.stop());
        _scanStream = null;
    }
    
    document.getElementById('salesScannerView').innerHTML = '';
    document.getElementById('salesScanBtn').classList.remove('d-none');
    document.getElementById('salesStopBtn').classList.add('d-none');
}

async function scanProduct() {
    const barcode = document.getElementById('salesBarcode').value.trim();
    if (!barcode) return;
    
    const data = await API.get(`/api/lookup/${encodeURIComponent(barcode)}`);
    
    if (data.error || data.type !== 'product') {
        showToast(data.type==='product'?'':'未找到商品: ' + barcode, 'warning');
        document.getElementById('productInfo').classList.add('d-none');
        return;
    }
    
    currentProduct = data;
    document.getElementById('productInfo').classList.remove('d-none');
    document.getElementById('prodName').textContent = (data.product_name||'').substring(0,60);
    document.getElementById('prodCode').textContent = data.internal_code;
    document.getElementById('prodStock').textContent = data.current_stock;
    document.getElementById('prodPrice').textContent = formatJPY(data.selling_price || 0);
    
    updateSaleTotal();
}

function updateSaleTotal() {
    const qty = parseInt(document.getElementById('saleQty').value) || 1;
    const price = currentProduct ? (currentProduct.selling_price || 0) : 0;
    document.getElementById('saleTotal').textContent = formatJPY(price * qty);
}

document.getElementById('saleQty').addEventListener('input', updateSaleTotal);

async function doSale() {
    if (!currentProduct) return;
    
    const qty = parseInt(document.getElementById('saleQty').value) || 1;
    const wantReceipt = document.getElementById('printReceipt').checked;
    
    const result = await API.post('/api/sales/create', {
        product_id: currentProduct.id,
        qty: qty,
        unit_price: currentProduct.selling_price,
        payment_method: document.getElementById('paymentMethod').value,
        platform: document.getElementById('salesPlatform').value
    });
    
    if (result.success) {
        showToast(`销售完成: ${result.product_name} ${formatJPY(result.total_amount)} (利润: ${formatJPY(result.profit)})`, 'success');
        
        if (wantReceipt) {
            await printReceipt(result.sale_id);
        } else {
            showToast('小票未打印 → 可从记录中补打', 'info');
        }
        
        document.getElementById('salesBarcode').value = '';
        document.getElementById('productInfo').classList.add('d-none');
        document.getElementById('saleQty').value = 1;
        currentProduct = null;
        loadSalesHistory();
        loadTodaySummary();
        document.getElementById('salesBarcode').focus();
    } else {
        showToast(result.error || '错误', 'error');
    }
}

async function printReceipt(saleId) {
    try {
        const res = await fetch(`/api/sales/${saleId}/receipt`, { method: 'POST' });
        const data = await res.json();
        
        if (data.success && data.receipt_html) {
            const win = window.open('', '_blank', 'width=350,height=600');
            win.document.write(data.receipt_html);
            win.document.close();
        }
    } catch (err) {
        showToast('小票打印错误: ' + err.message, 'error');
    }
}

async function reprintReceipt(saleId) {
    showToast('正在补打小票...', 'info');
    await printReceipt(saleId);
    loadSalesHistory();
}

// ─── External Sale Registration ──────────────────────────────
function openExternalSaleModal() {
    document.getElementById('externalBarcode').value = '';
    document.getElementById('externalProductInfo').classList.add('d-none');
    document.getElementById('externalPrice').value = '';
    document.getElementById('externalQty').value = '1';
    document.getElementById('externalOrderNo').value = '';
    externalProduct = null;
    new bootstrap.Modal(document.getElementById('externalSaleModal')).show();
}

async function lookupExternalProduct() {
    const barcode = document.getElementById('externalBarcode').value.trim();
    if (!barcode) return;
    
    const data = await API.get(`/api/lookup/${encodeURIComponent(barcode)}`);
    
    if (data.error || data.type !== 'product') {
        showToast('未找到商品', 'warning');
        return;
    }
    
    externalProduct = data;
    document.getElementById('extProdName').textContent = data.product_name || '';
    document.getElementById('extProdStock').textContent = data.current_stock;
    document.getElementById('extProdPrice').textContent = formatJPY(data.selling_price || 0);
    document.getElementById('externalPrice').value = data.selling_price || 0;
    document.getElementById('externalProductInfo').classList.remove('d-none');
}

async function registerExternalSale() {
    if (!externalProduct) {
        showToast('请先输入商品条码', 'warning');
        return;
    }
    
    const platform = document.getElementById('externalPlatform').value;
    const price = parseInt(document.getElementById('externalPrice').value) || 0;
    const qty = parseInt(document.getElementById('externalQty').value) || 1;
    
    if (price <= 0) {
        showToast('请输入实际售价', 'warning');
        return;
    }
    
    const result = await API.post('/api/sales/create', {
        product_id: externalProduct.id,
        qty: qty,
        unit_price: price,
        payment_method: 'other',
        platform: platform,
        note: '外部销售登记' + (document.getElementById('externalOrderNo').value ? ' 订单:' + document.getElementById('externalOrderNo').value : '')
    });
    
    if (result.success) {
        showToast(`外部销售已登记: ${result.product_name} (${platform})`, 'success');
        bootstrap.Modal.getInstance(document.getElementById('externalSaleModal')).hide();
        loadSalesHistory();
        loadTodaySummary();
    } else {
        showToast(result.error || '登记失败', 'error');
    }
}

// ─── Load Sales History with Platform Filter ──────────────────────────────
async function loadSalesHistory() {
    try {
        const platform = document.getElementById('platformFilter').value;
        const date = document.getElementById('salesDateFilter').value;
        
        let url = '/api/sales/recent?limit=50';
        if (platform) url += `&platform=${platform}`;
        if (date) url += `&date=${date}`;
        
        const res = await fetch(url);
        const sales = await res.json();
        
        const paymentIcons = {
            'cash': '💰', 'paypay': '📱', 'card': '💳', 'mercari': '🛒', 'other': '📝'
        };
        const platformIcons = {
            'physical': '🏪实体',
            'mercari': '🛒煤炉',
            'yahoo': '🟨雅虎',
            'rakuten': '🛍️乐天',
            'other': '📦其他'
        };
        
        document.getElementById('salesHistory').innerHTML = sales.length === 0
            ? '<p class="text-muted text-center py-4">暂无销售记录</p>'
            : sales.map(s => `
                <div class="d-flex justify-content-between align-items-center py-2 border-bottom">
                    <div style="flex:1;min-width:0">
                        <small class="text-muted"><code>${s.internal_code || '---'}</code></small>
                        <div class="small" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis">
                            ${(s.product_name||'').substring(0,35)}
                        </div>
                        <small class="text-muted">
                            ${s.sale_date ? s.sale_date.substring(5,16) : ''} 
                            ${paymentIcons[s.payment_method] || ''} ${s.qty}件
                            <span class="badge bg-info btn-sm ms-1" style="font-size:9px">${platformIcons[s.platform] || s.platform || '未分类'}</span>
                        </small>
                    </div>
                    <div class="text-end ms-2" style="flex-shrink:0">
                        <div class="fw-bold">${formatJPY(s.total_amount)}</div>
                        <small class="${s.profit_amount >= 0 ? 'text-success' : 'text-danger'}">
                            利润 ${formatJPY(s.profit_amount || 0)}
                        </small>
                        <div class="mt-1">
                            ${s.receipt_id ? `
                                <button class="btn btn-outline-secondary btn-sm py-0 px-1" 
                                        onclick="reprintReceipt(${s.id})" 
                                        title="补打（已打印${s.printed_count || 0}次）">
                                    <i class="bi bi-printer-fill"></i> 补打
                                </button>
                            ` : `
                                <button class="btn btn-outline-primary btn-sm py-0 px-1" 
                                        onclick="printReceipt(${s.id})">
                                    <i class="bi bi-printer"></i> 打印
                                </button>
                            `}
                        </div>
                    </div>
                </div>
            `).join('');
    } catch (err) {
        console.error('加载销售记录失败:', err);
    }
}

async function loadTodaySummary() {
    try {
        const res = await fetch('/api/sales/report?period=day');
        const data = await res.json();
        
        document.getElementById('todayCount').textContent = data.total_count || 0;
        document.getElementById('todayRevenue').textContent = formatJPY(data.total_revenue || 0);
        document.getElementById('todayProfit').textContent = formatJPY(data.total_profit || 0);
        
        // Platform breakdown
        if (data.platform_stats) {
            const platformIcons = {
                'physical': '🏪实体',
                'mercari': '🛒煤炉',
                'yahoo': '🟨雅虎',
                'rakuten': '🛍️乐天',
                'other': '📦其他'
            };
            document.getElementById('platformStats').innerHTML = Object.entries(data.platform_stats).map(([p, s]) => `
                <span class="badge bg-light text-dark border" style="font-size:11px">
                    ${platformIcons[p] || p}: ${s.count}件 ${formatJPY(s.revenue)}
                </span>
            `).join('');
        }
    } catch (err) {
        console.error('加载今日汇总失败:', err);
    }
}

// ─── Photo Scan Barcode (拍照→pyzbar后端解码→自动查商品) ──
async function photoScanBarcode(input) {
    const file = input.files[0];
    if (!file) return;
    
    showToast('解码中...', 'info');
    
    try {
        const formData = new FormData();
        formData.append('image', file);
        
        const res = await fetch('/api/inbound/ai-read-barcode', { method: 'POST', body: formData });
        const data = await res.json();
        
        if (data.success && data.barcode) {
            showToast('识别: ' + data.barcode, 'success');
            document.getElementById('salesBarcode').value = data.barcode;
            // Auto-trigger product lookup
            await scanProduct();
        } else {
            showToast('未识别到条码，请重拍或手动输入', 'warning');
        }
    } catch(e) {
        showToast('解码失败: ' + e.message, 'danger');
    }
    
    input.value = '';
}

// ─── Init ─────────────────────────────
document.getElementById('salesDateFilter').value = new Date().toISOString().split('T')[0];

loadSalesHistory();
loadTodaySummary();

// Auto-focus barcode input
document.getElementById('salesBarcode').focus();
</script>
